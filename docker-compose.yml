services:
  db:
    image: postgres:16
    container_name: mulchparts-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mulchparts
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: mulchparts
    ports:
      # Bound to localhost only — DB is internal infrastructure.
      - "127.0.0.1:5436:5432"
    volumes:
      - mulchparts_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mulchparts -d mulchparts"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: mulchparts-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://mulchparts:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@db:5432/mulchparts
      # Multi-user form (preferred). Falls back to the singular pair below
      # when unset — see src/server.js for the parser.
      MULCHPARTS_ADMIN_USERS: ${MULCHPARTS_ADMIN_USERS:-}
      MULCHPARTS_ADMIN_USER: ${MULCHPARTS_ADMIN_USER:-admin}
      MULCHPARTS_ADMIN_PASSWORD: ${MULCHPARTS_ADMIN_PASSWORD:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://mulchparts.pcc2k.com}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      # nginx on the PCC2K box reverse-proxies https://mulchparts.pcc2k.com → :3009
      - "3009:3000"
    volumes:
      - mulchparts_uploads:/app/uploads

  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: mulchparts-ntfy
    restart: unless-stopped
    command: serve
    ports:
      # nginx on PCC2K reverse-proxies https://mulchparts-ntfy.pcc2k.com → :8091
      - "8091:80"
    volumes:
      - ./ntfy/server.yml:/etc/ntfy/server.yml:ro
      - mulchparts_ntfy_cache:/var/cache/ntfy

volumes:
  mulchparts_pgdata:
  mulchparts_uploads:
  mulchparts_ntfy_cache:
